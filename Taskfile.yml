version: '1'
name: weboql
description: Minimal Taskfile
variables:
  APP_NAME: weboql
environments:
  local:
    container_runtime: docker
    compose_command: docker compose
tasks:
  install:
    desc: Install Python dependencies (editable)
    cmds:
    - pip install -e .[dev]
  test:
    desc: Run pytest suite
    cmds:
    - pytest -q
  build:
    desc: Build wheel + sdist
    cmds:
    - python -m build
  clean:
    desc: Remove build artefacts
    cmds:
    - rm -rf build/ dist/ *.egg-info
  help:
    desc: Show available tasks
    cmds:
    - echo "weboql — available tasks:"
    - echo ""
    - taskfile list
  dev:
    desc: '[imported from Makefile] dev'
    cmds:
    - pip install -e ".[dev]"
  run:
    desc: '[imported from Makefile] run'
    cmds:
    - HARDWARE_MODE=mock weboql-server
  run-prod:
    desc: '[imported from Makefile] run-prod'
    cmds:
    - weboql-server
  test-e2e:
    desc: '[imported from Makefile] test-e2e'
    cmds:
    - ./tests/e2e.sh
  test-hardware-cli:
    desc: '[imported from Makefile] test-hardware-cli'
    cmds:
    - ./tests/test-hardware-cli.sh
  publish:
    desc: '[imported from Makefile] publish'
    cmds:
    - twine upload dist/*
  publish-test:
    desc: '[imported from Makefile] publish-test'
    cmds:
    - twine upload --repository testpypi dist/
  health:
    desc: '[from doql] workflow: health'
    cmds:
    - docker compose ps
    - docker compose exec app echo "Health check passed"
  import-makefile-hint:
    desc: '[from doql] workflow: import-makefile-hint'
    cmds:
    - 'echo ''Run: taskfile import Makefile to import existing targets.'''
  all:
    desc: Run install, lint, test
    cmds:
    - taskfile run install
    - taskfile run lint
    - taskfile run test
  fmt:
    desc: Auto-format with ruff
    cmds:
    - ruff format .
  lint:
    desc: Run ruff lint check
    cmds:
    - ruff check .
