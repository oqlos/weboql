<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OqlOS Web Console — Scenarios • REPL • Plugins</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #16213e;
            padding: 1rem 2rem;
            border-bottom: 2px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 1.5rem;
            color: #e94560;
        }
        
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .sidebar {
            width: 300px;
            background: #0f3460;
            border-right: 2px solid #16213e;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 1rem;
            background: #16213e;
            font-weight: bold;
            border-bottom: 1px solid #0f3460;
        }
        
        .file-list {
            list-style: none;
        }
        
        .file-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid #1a1a2e;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .file-item:hover {
            background: #1a1a2e;
        }
        
        .file-item.active {
            background: #e94560;
        }
        
        .file-icon {
            font-size: 1.2rem;
        }
        
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .editor-toolbar {
            background: #16213e;
            padding: 0.75rem 1rem;
            display: flex;
            gap: 0.5rem;
            border-bottom: 2px solid #0f3460;
        }
        
        .toolbar-btn {
            background: #0f3460;
            color: #eee;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .toolbar-btn:hover {
            background: #e94560;
        }
        
        .toolbar-btn:disabled {
            background: #333;
            cursor: not-allowed;
        }
        
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .file-name-display {
            background: #1a1a2e;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            color: #888;
            border-bottom: 1px solid #0f3460;
        }
        
        textarea {
            flex: 1;
            background: #0f0f1a;
            color: #eee;
            border: none;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }
        
        .status-bar {
            background: #16213e;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid #0f3460;
        }
        
        .execution-panel {
            background: #1a1a2e;
            border-top: 2px solid #0f3460;
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .execution-panel h3 {
            margin-bottom: 0.5rem;
            color: #e94560;
        }
        
        .log-entry {
            padding: 0.25rem 0;
            font-size: 0.85rem;
        }
        
        .log-entry.success {
            color: #4ade80;
        }
        
        .log-entry.error {
            color: #f87171;
        }
        
        .log-entry.info {
            color: #60a5fa;
        }
        
        .controls {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .copy-btn {
            background: #0f3460;
            color: #eee;
            border: 1px solid #16213e;
            padding: 0.25rem 0.5rem;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        
        .copy-btn:hover {
            background: #e94560;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #1a1a2e;
            border: 2px solid #0f3460;
            border-radius: 8px;
            padding: 2rem;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 1rem;
        }
        
        .modal-header h2 {
            color: #e94560;
            margin: 0;
        }
        
        .close-btn {
            background: #0f3460;
            color: #eee;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 4px;
            font-size: 1.2rem;
        }
        
        .close-btn:hover {
            background: #e94560;
        }
        
        .status-section {
            margin-bottom: 1.5rem;
        }
        
        .status-section h3 {
            color: #60a5fa;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #16213e;
        }
        
        .status-label {
            color: #888;
        }
        
        .status-value {
            color: #eee;
            font-weight: bold;
        }
        
        .status-value.ok {
            color: #4ade80;
        }
        
        .status-value.error {
            color: #f87171;
        }
        
        .status-value.warning {
            color: #fbbf24;
        }
        
        select, input {
            background: #0f3460;
            color: #eee;
            border: 1px solid #16213e;
            padding: 0.5rem;
            border-radius: 4px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #16213e;
            border-bottom: 2px solid #0f3460;
            gap: 2px;
        }
        .tab-btn {
            background: #0f3460;
            color: #eee;
            border: none;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            font-weight: bold;
        }
        .tab-btn:hover { background: #1a1a2e; }
        .tab-btn.active { background: #e94560; }

        /* Tab panels */
        .tab-panel { display: none; height: 100%; }
        .tab-panel.active { display: flex; flex-direction: column; }

        /* REPL panel */
        .repl-panel {
            background: #0f0f1a;
            padding: 0.75rem 1rem;
            border-bottom: 2px solid #0f3460;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .repl-panel input {
            flex: 1;
            background: #1a1a2e;
            padding: 0.6rem;
            font-family: 'Courier New', monospace;
        }

        /* Plugin Config Editor */
        .plugin-editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }
        .plugin-editor textarea {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            background: #0f0f1a;
            color: #4ade80;
            padding: 1rem;
            border: 1px solid #0f3460;
            resize: none;
        }
        .plugin-toolbar {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem 0;
            align-items: center;
        }

        /* Install panel */
        .install-panel {
            background: #16213e;
            padding: 1rem;
            border-top: 2px solid #0f3460;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔧 WebOQL Console</h1>
        <div>
            <button class="toolbar-btn" onclick="refreshFiles()">🔄 Refresh Files</button>
            <button class="toolbar-btn" onclick="showSystemStatus()">📊 System Status</button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('scenarios')" id="tab-scenarios">📁 Scenarios</button>
        <button class="tab-btn" onclick="switchTab('plugins')" id="tab-plugins">🔌 Plugins</button>
    </div>

    <!-- Scenarios Tab -->
    <div class="tab-panel active" id="panel-scenarios">
        <div class="main-container">
            <div class="sidebar">
                <div class="sidebar-header">📁 Scenarios</div>
                <ul class="file-list" id="fileList"></ul>
            </div>
            <div class="editor-container">
                <!-- REPL Line Execution -->
                <div class="repl-panel">
                    <span style="color: #4ade80; font-weight: bold;">&gt;</span>
                    <input type="text" id="replInput" placeholder="Type OQL command (e.g., 'WAIT 1s', 'SET pompa 1') and press Enter..." onkeydown="if(event.key==='Enter')executeLine()">
                    <select id="replMode" style="width: 100px;">
                        <option value="mock">Mock</option>
                        <option value="real">Real</option>
                    </select>
                    <button class="toolbar-btn" onclick="executeLine()">▶️ Run</button>
                </div>

                <div class="editor-toolbar">
                    <button class="toolbar-btn" id="saveBtn" onclick="saveFile()" disabled>💾 Save File</button>
                    <button class="toolbar-btn" id="executeBtn" onclick="executeScenario()" disabled>▶️ Execute File</button>
                    <select id="modeSelect">
                        <option value="mock">Mock Mode</option>
                        <option value="real">Real Mode</option>
                    </select>
                    <input type="number" id="speedInput" value="1.0" min="0.1" max="10.0" step="0.1" style="width: 70px;">
                    <span style="align-self: center; color: #888; font-size: 0.85rem;">Speed</span>
                </div>

                <div class="editor-area">
                    <div class="file-name-display" id="fileNameDisplay">No file selected</div>
                    <textarea id="editor" placeholder="Select a scenario file to edit, or type a snippet above and press Run..."></textarea>
                </div>

                <div class="execution-panel">
                    <div class="log-header">
                        <span style="color: #e94560; font-weight: bold;">⚡ Execution Log</span>
                        <button class="copy-btn" onclick="copyLogs()">📋 Copy Logs</button>
                    </div>
                    <div id="executionLog"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Plugins Tab -->
    <div class="tab-panel" id="panel-plugins">
        <div class="plugin-editor">
            <div class="plugin-toolbar">
                <button class="toolbar-btn" onclick="loadPluginConfig()">📥 Load Config</button>
                <button class="toolbar-btn" onclick="savePluginConfig()" style="background: #e94560;">💾 Save YAML</button>
                <button class="toolbar-btn" onclick="reloadPlugins()">🔄 Reload Plugins</button>
                <span id="pluginSaveStatus" style="color: #888; font-size: 0.85rem;"></span>
            </div>
            <textarea id="pluginConfigEditor" placeholder="# Plugin YAML config will load here...
# Edit scales, units, conversions directly and Save."></textarea>
        </div>

        <div class="install-panel">
            <h3 style="color: #60a5fa; margin-bottom: 0.5rem;">📦 Install New Plugin</h3>
            <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
                <input type="text" id="packageInput" placeholder="Package (e.g., oqlos-driver-dri0050>=1.0)" style="flex: 1; min-width: 300px;">
                <button class="toolbar-btn" onclick="installPlugin()">⬇️ pip install</button>
            </div>
            <div id="installOutput" style="margin-top: 0.5rem; font-family: monospace; font-size: 12px; color: #4ade80; white-space: pre-wrap; max-height: 150px; overflow-y: auto;"></div>
        </div>
    </div>
    
    <div class="status-bar" id="statusBar">Ready</div>

<!-- System Status Modal -->
<div id="statusModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📊 System Status</h2>
            <div>
                <button class="copy-btn" onclick="copyStatusAsJSON()">📋 JSON</button>
                <button class="copy-btn" onclick="copyStatusAsYAML()">📋 YAML</button>
                <button class="close-btn" onclick="closeStatusModal()">×</button>
            </div>
        </div>
        <div id="statusContent">
            <p>Loading system status...</p>
        </div>
    </div>
</div>
    
    <script>
        const API_BASE = '/api/v1/editor';
        let currentFile = null;
        let files = [];
        let currentSystemStatus = null;
        
        function updateURL() {
            const params = new URLSearchParams();
            if (currentFile) {
                params.set('file', currentFile.name);
            }
            const mode = document.getElementById('modeSelect').value;
            params.set('mode', mode);
            const speed = document.getElementById('speedInput').value;
            params.set('speed', speed);
            
            const newURL = params.toString() ? '?' + params.toString() : window.location.pathname;
            window.history.replaceState(null, '', newURL);
        }
        
        function parseURLParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                file: params.get('file'),
                mode: params.get('mode'),
                speed: params.get('speed')
            };
        }
        
        async function loadFiles() {
            try {
                const response = await fetch(`${API_BASE}/files`);
                const data = await response.json();
                files = data.files;
                renderFileList();
                updateStatus(`Loaded ${files.length} files`);
                
                // Restore file selection from URL parameters
                const params = parseURLParams();
                if (params.file) {
                    const fileToSelect = files.find(f => f.name === params.file);
                    if (fileToSelect) {
                        // Simulate click on the file item
                        setTimeout(() => {
                            const fileItems = document.querySelectorAll('.file-item');
                            fileItems.forEach(item => {
                                if (item.textContent.includes(params.file)) {
                                    item.click();
                                }
                            });
                        }, 100);
                    }
                }
            } catch (error) {
                updateStatus(`Error loading files: ${error.message}`, 'error');
            }
        }
        
        function renderFileList() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            
            files.forEach(file => {
                if (file.is_directory) return;
                
                const li = document.createElement('li');
                li.className = 'file-item';
                li.innerHTML = `
                    <span class="file-icon">📄</span>
                    <span>${file.name}</span>
                `;
                li.onclick = () => selectFile(file);
                fileList.appendChild(li);
            });
        }
        
        async function selectFile(file) {
            currentFile = file;
            
            // Update UI
            document.querySelectorAll('.file-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('fileNameDisplay').textContent = file.name;
            document.getElementById('saveBtn').disabled = false;
            document.getElementById('executeBtn').disabled = false;
            
            // Load content
            try {
                updateStatus('Loading file...');
                const response = await fetch(`${API_BASE}/file/${file.path}`);
                const data = await response.json();
                document.getElementById('editor').value = data.content;
                updateStatus(`Loaded: ${file.name}`);
                updateURL();
            } catch (error) {
                updateStatus(`Error loading file: ${error.message}`, 'error');
            }
        }
        
        async function saveFile() {
            if (!currentFile) return;
            
            const content = document.getElementById('editor').value;
            
            try {
                updateStatus('Saving file...');
                const response = await fetch(`${API_BASE}/file/${currentFile.path}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: currentFile.path, content })
                });
                
                if (response.ok) {
                    updateStatus(`Saved: ${currentFile.name}`);
                    addLog('success', `File saved: ${currentFile.name}`);
                } else {
                    throw new Error('Save failed');
                }
            } catch (error) {
                updateStatus(`Error saving file: ${error.message}`, 'error');
                addLog('error', `Save failed: ${error.message}`);
            }
        }
        
        async function executeScenario() {
            if (!currentFile) return;
            
            const mode = document.getElementById('modeSelect').value;
            const speed = parseFloat(document.getElementById('speedInput').value);
            const timestamp = new Date().toISOString();
            const executionId = `${currentFile.name}-${Date.now()}`;
            
            try {
                updateStatus('Executing scenario...');
                addLog('info', `Starting execution: ${currentFile.name} (${mode} mode, speed ${speed}x)`);
                addLog('info', `Execution ID: ${executionId}`);
                addLog('info', `Timestamp: ${timestamp}`);
                
                // Add URL parameters for logging
                const url = new URL(`${API_BASE}/execute`, window.location.origin);
                url.searchParams.append('file', currentFile.name);
                url.searchParams.append('mode', mode);
                url.searchParams.append('speed', speed);
                url.searchParams.append('execution_id', executionId);
                url.searchParams.append('timestamp', timestamp);
                
                const response = await fetch(url.toString(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        scenario_file: currentFile.path,
                        mode: mode,
                        speed: speed,
                        execution_id: executionId,
                        timestamp: timestamp
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    updateStatus(`Execution completed: ${data.steps_executed} steps in ${data.duration_ms.toFixed(2)}ms`);
                    addLog('success', `Execution completed: ${data.steps_executed} steps in ${data.duration_ms.toFixed(2)}ms`);
                    addLog('success', `Scenario: ${data.scenario_name}`);
                    addLog('info', `Status: ${data.status}, OK: ${data.ok}`);
                    addLog('info', `File: ${currentFile.name}, Mode: ${mode}, Speed: ${speed}x`);
                    if (data.errors && data.errors.length > 0) {
                        data.errors.forEach(err => addLog('error', `Error: ${err}`));
                    }
                    if (data.warnings && data.warnings.length > 0) {
                        data.warnings.forEach(warn => addLog('info', `Warning: ${warn}`));
                    }
                } else {
                    throw new Error(data.detail || 'Execution failed');
                }
            } catch (error) {
                updateStatus(`Error executing scenario: ${error.message}`, 'error');
                addLog('error', `Execution failed: ${error.message}`);
                addLog('error', `File: ${currentFile.name}, Mode: ${mode}, Speed: ${speed}x`);
            }
        }
        
        function updateStatus(message, type = 'info') {
            const statusBar = document.getElementById('statusBar');
            statusBar.textContent = message;
            statusBar.style.color = type === 'error' ? '#f87171' : type === 'success' ? '#4ade80' : '#888';
        }
        
        function addLog(type, message) {
            const logPanel = document.getElementById('executionLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
        }
        
        function copyLogs() {
            const logPanel = document.getElementById('executionLog');
            const logs = logPanel.innerText;
            
            if (!logs.trim()) {
                updateStatus('No logs to copy', 'error');
                return;
            }
            
            navigator.clipboard.writeText(logs).then(() => {
                updateStatus('Logs copied to clipboard', 'success');
                addLog('info', 'Logs copied to clipboard');
            }).catch(err => {
                updateStatus('Failed to copy logs', 'error');
                addLog('error', `Copy failed: ${err.message}`);
            });
        }
        
        function refreshFiles() {
            loadFiles();
        }
        
        async function showSystemStatus() {
            const modal = document.getElementById('statusModal');
            const content = document.getElementById('statusContent');
            
            modal.style.display = 'flex';
            content.innerHTML = '<p>Loading system status...</p>';
            
            try {
                const response = await fetch(`${API_BASE}/status`);
                const status = await response.json();
                currentSystemStatus = status; // Store for copy functions
                
                content.innerHTML = `
                    <div class="status-section">
                        <h3>📁 Project Configuration</h3>
                        <div class="status-item">
                            <span class="status-label">Scenarios Directory:</span>
                            <span class="status-value">${status.scenarios_dir}</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Directory Exists:</span>
                            <span class="status-value ${status.scenarios_dir_exists ? 'ok' : 'error'}">
                                ${status.scenarios_dir_exists ? '✓ Yes' : '✗ No'}
                            </span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Scenario Files:</span>
                            <span class="status-value">${status.scenarios_count} files</span>
                        </div>
                    </div>
                    
                    <div class="status-section">
                        <h3>⚙️ Hardware Configuration</h3>
                        <div class="status-item">
                            <span class="status-label">Hardware Mode:</span>
                            <span class="status-value ${status.hardware_mode === 'mock' ? 'warning' : 'ok'}">
                                ${status.hardware_mode.toUpperCase()}
                            </span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">PIADC URL:</span>
                            <span class="status-value ${status.piadc_url ? 'ok' : 'warning'}">
                                ${status.piadc_url || 'Not configured'}
                                ${status.piadc_available ? ' ✓' : ' ✗'}
                            </span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Motor URL:</span>
                            <span class="status-value ${status.motor_url ? 'ok' : 'warning'}">
                                ${status.motor_url || 'Not configured'}
                                ${status.motor_available ? ' ✓' : ' ✗'}
                            </span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Modbus Serial:</span>
                            <span class="status-value ${status.modbus_serial ? 'ok' : 'warning'}">
                                ${status.modbus_serial || 'Not configured'}
                                ${status.modbus_available ? ' ✓' : ' ✗'}
                            </span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Modbus Host:</span>
                            <span class="status-value ${status.modbus_host ? 'ok' : 'warning'}">
                                ${status.modbus_host || 'Not configured'}
                            </span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Modbus Port:</span>
                            <span class="status-value ${status.modbus_port ? 'ok' : 'warning'}">
                                ${status.modbus_port || 'Not configured'}
                            </span>
                        </div>
                    </div>
                    
                    <div class="status-section">
                        <h3>💡 Configuration Tips</h3>
                        <div style="font-size: 0.85rem; color: #888; line-height: 1.5;">
                            ${status.hardware_mode === 'mock' ? 
                                '<p>⚠️ Running in MOCK mode - no hardware access. Set HARDWARE_MODE=real in .env for hardware operation.</p>' : 
                                '<p>✓ Running in REAL mode - hardware access enabled.</p>'}
                            ${!status.scenarios_dir_exists ? 
                                '<p>⚠️ Scenarios directory not found. Check SCENARIOS_DIR in .env</p>' : 
                                ''}
                            ${status.scenarios_count === 0 ? 
                                '<p>⚠️ No scenario files found in directory.</p>' : 
                                ''}
                            ${status.piadc_url && !status.piadc_available ? 
                                '<p>⚠️ PIADC service configured but not responding at ' + status.piadc_url + '</p>' : 
                                ''}
                            ${status.motor_url && !status.motor_available ? 
                                '<p>⚠️ Motor service configured but not responding at ' + status.motor_url + '</p>' : 
                                ''}
                            ${status.modbus_serial && !status.modbus_available ? 
                                '<p>⚠️ Modbus serial port configured but not found: ' + status.modbus_serial + '</p>' : 
                                ''}
                        </div>
                    </div>
                `;
            } catch (error) {
                content.innerHTML = `<p style="color: #f87171;">Error loading status: ${error.message}</p>`;
            }
        }
        
        function closeStatusModal() {
            document.getElementById('statusModal').style.display = 'none';
        }
        
        function copyStatusAsJSON() {
            if (!currentSystemStatus) {
                alert('No status data to copy');
                return;
            }
            const json = JSON.stringify(currentSystemStatus, null, 2);
            navigator.clipboard.writeText(json).then(() => {
                alert('Status copied as JSON to clipboard');
            }).catch(err => {
                alert('Failed to copy: ' + err.message);
            });
        }
        
        function copyStatusAsYAML() {
            if (!currentSystemStatus) {
                alert('No status data to copy');
                return;
            }
            let yaml = 'system_status:\n';
            for (const [key, value] of Object.entries(currentSystemStatus)) {
                if (typeof value === 'boolean') {
                    yaml += `  ${key}: ${value ? 'true' : 'false'}\n`;
                } else if (value === null || value === undefined) {
                    yaml += `  ${key}: null\n`;
                } else {
                    yaml += `  ${key}: ${value}\n`;
                }
            }
            navigator.clipboard.writeText(yaml).then(() => {
                alert('Status copied as YAML to clipboard');
            }).catch(err => {
                alert('Failed to copy: ' + err.message);
            });
        }
        
        // Close modal on outside click
        document.getElementById('statusModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeStatusModal();
            }
        });
        
        // Add event listeners for mode and speed changes
        document.getElementById('modeSelect').addEventListener('change', updateURL);
        document.getElementById('speedInput').addEventListener('change', updateURL);

        // Initialize
        loadFiles();

        // Parse URL parameters on load and restore state
        window.addEventListener('DOMContentLoaded', function() {
            const params = parseURLParams();
            if (params.mode) {
                document.getElementById('modeSelect').value = params.mode;
            }
            if (params.speed) {
                document.getElementById('speedInput').value = params.speed;
            }
            // File selection will happen after files are loaded

            // Load plugin config on first Plugins tab visit (deferred until needed)
        });

        // ---------- Tabs ----------
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            document.getElementById('panel-' + tabName).classList.add('active');
            if (tabName === 'plugins') loadPluginConfig();
        }

        // ---------- REPL ----------
        async function executeLine() {
            const input = document.getElementById('replInput');
            const source = input.value.trim();
            if (!source) return;
            const mode = document.getElementById('replMode').value;

            addLog('info', `> ${source} [mode=${mode}]`);
            try {
                const resp = await fetch('/api/v1/plugins/execute-line', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({source: source, mode: mode, skip_waits: true})
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || 'Request failed');

                if (data.ok) {
                    addLog('success', `✓ Steps: ${data.steps_executed || 0}, Took ${data.duration_ms || 0}ms`);
                    if (data.warnings?.length) data.warnings.forEach(w => addLog('info', `Warning: ${w}`));
                } else {
                    addLog('error', `Failed: ${data.errors?.join('; ') || 'Unknown error'}`);
                }
            } catch (e) {
                addLog('error', `Error: ${e.message}`);
            }
            input.value = '';
        }

        // ---------- Plugins ----------
        async function loadPluginConfig() {
            try {
                const resp = await fetch('/api/v1/plugins/config');
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail);
                document.getElementById('pluginConfigEditor').value = data.raw;
                updateStatus('Plugin config loaded', 'info');
            } catch (e) {
                updateStatus('Failed to load plugin config: ' + e.message, 'error');
            }
        }

        async function savePluginConfig() {
            const raw = document.getElementById('pluginConfigEditor').value;
            const status = document.getElementById('pluginSaveStatus');
            status.textContent = 'Saving...';
            try {
                const resp = await fetch('/api/v1/plugins/config', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({yaml_content: raw})
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail);
                status.textContent = '✓ Saved';
                status.style.color = '#4ade80';
                updateStatus('Plugin config saved', 'success');
            } catch (e) {
                status.textContent = '✗ Error';
                status.style.color = '#f87171';
                updateStatus('Save failed: ' + e.message, 'error');
            }
        }

        async function reloadPlugins() {
            const status = document.getElementById('pluginSaveStatus');
            status.textContent = 'Reloading...';
            try {
                const resp = await fetch('/api/v1/plugins/reload', {method: 'POST'});
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail);
                status.textContent = `✓ ${data.configs_loaded} loaded, ${data.entry_points_discovered?.length || 0} discovered`;
                status.style.color = '#4ade80';
            } catch (e) {
                status.textContent = '✗ Error';
                status.style.color = '#f87171';
                updateStatus('Reload failed: ' + e.message, 'error');
            }
        }

        async function installPlugin() {
            const pkg = document.getElementById('packageInput').value.trim();
            const out = document.getElementById('installOutput');
            if (!pkg) return;
            out.textContent = `Installing ${pkg}...\n`;
            try {
                const resp = await fetch('/api/v1/plugins/install', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({package: pkg})
                });
                const data = await resp.json();
                out.textContent += data.output || (data.success ? 'Done.' : 'Failed.');
                if (data.success) {
                    updateStatus(`Installed ${pkg}`, 'success');
                    // Auto-reload after install
                    await reloadPlugins();
                } else {
                    updateStatus(`Install failed: ${pkg}`, 'error');
                }
            } catch (e) {
                out.textContent += `Error: ${e.message}`;
                updateStatus('Install error: ' + e.message, 'error');
            }
        }
    </script>
</body>
</html>
